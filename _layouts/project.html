---
layout: default
---
<article class="project">
  <header class="project-header">
    <h1>{{ page.title }}</h1>
    {% if page.date %}<time>{{ page.date | date: "%B %d, %Y" }}</time>{% endif %}
    {% if page.tags %}
    <div class="tags">
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
    {% if page.status %}
    <span class="status status-{{ page.status }}">{{ page.status }}</span>
    {% endif %}
  </header>

  <div class="project-content">
    {{ content }}
  </div>

  <a class="back-link" href="{{ '/research/' | relative_url }}">&larr; Back to all projects</a>
</article>
